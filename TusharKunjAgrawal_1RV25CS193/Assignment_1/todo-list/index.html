<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>To-Do List</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="header">
    <img src="https://i.pravatar.cc/80" alt="Avatar" class="avatar" id="avatar">

    <label for="imageInput" class="upload-btn">Change Avatar</label>
    <input type="file" id="imageInput" accept="image/*" hidden>

    <h1>📝 To-Do List</h1>

    <p class="bio">
      A simple To-Do List built using HTML, CSS and JavaScript.
    </p>
  </header>

  <main>
    <section class="input-section">
      <input type="text" id="taskInput" placeholder="Enter a task...">
      <button id="addBtn">Add</button>
    </section>

    <ul id="taskList"></ul>
  </main>

  <footer>
    <p>Simple To-Do List using HTML, CSS & JavaScript</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
