<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>To-Do List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
       <header class="main-header">
          <div class="header-left">
             <img src="https://i.pinimg.com/736x/d0/27/88/d027883c4433588403dba9de4aa05eef.jpg" alt="Avatar" class="avatar">
             <div class="profile-info">
                 <h3>Pranamya R</h3>
                 <p>Learning Web Development and Artist</p>
             </div>
             </div>

           <div class="header-right">
              <img src="https://cdn.vectorstock.com/i/preview-1x/52/09/motivational-quote-if-a-task-is-once-begun-vector-7655209.jpg" alt="Quote" class="quote-card">
           </div>
           <div class="quote-container">
              <p class="quote-text">"Heyy Buddy, You can DO it, Keep Going...!"</p>
           </div>
       </header>
       <div class="input-box">
            <input type="text" id="task-input" placeholder="Enter a task">
            <button id="add-task-btn">Add Task</button>
       </div>
       <ul id="task-list"></ul>
    </div>
    <script src="script.js"></script>
</body>
</html>
