<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-do list</title>
    <link rel="stylesheet" href="css.css">
</head>
<body>
    <p> TO-DO LIST</p>
    <div class="avatar">
        <div id="avatar_list"></div>
        <div id="avatar_name">iamhecker</div>
    </div>

    <div class="to_do_items">
        <h1>Tasks to be completed</h1>
        <input type="text" id="task_input" placeholder="Enter a task">
        <button id="add_task_button" onclick="addtask()">Add</button>
        <ul id="task_list"></ul>
    </div>
    <script src="js.js"></script>
</body>

</html>
